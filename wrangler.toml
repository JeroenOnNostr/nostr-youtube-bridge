name = "nostr-youtube-bridge"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Cron: every 15 minutes
[triggers]
crons = ["*/15 * * * *"]

# KV namespaces — create with: wrangler kv namespace create CHANNELS / PUBLISHED
# Then paste the ids here.
[[kv_namespaces]]
binding = "CHANNELS"
id = "e40c1d240cec4c4c80a876dfc40a36b5"

[[kv_namespaces]]
binding = "PUBLISHED"
id = "f19e7f1bbb2b4d7eabcf8847cf49a313"

[[kv_namespaces]]
binding = "EVENTS"
id = "3d9ae73b573e40768bf565d0ce0739df"

# DVM listener — single Durable Object holding the long-lived relay subscription
# for the search (5392) / watch (5393) job kinds. Poked on every cron tick (and
# /admin/dvm/start) so it self-heals if evicted between ticks.
[[durable_objects.bindings]]
name = "DVM"
class_name = "YouTubeDvm"

[[migrations]]
tag = "v1"
new_classes = ["YouTubeDvm"]

[vars]
RELAY_URLS = "wss://relay.kubo.watch,wss://relay.damus.io,wss://nos.lol,wss://relay.nostr.band"
SHORTS_KIND = "22"
BACKFILL_PER_FEED = "5"

# Secrets (set with: wrangler secret put <NAME>):
# - BRIDGE_MASTER_SEED   (32-byte hex)
# - ADMIN_TOKEN          (bearer token for /admin/channels)
